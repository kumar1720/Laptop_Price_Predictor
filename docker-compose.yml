version: '3.8'

services:
  laptop-price-predictor:
    build: .
    container_name: laptop-price-predictor-unified
    ports:
      - "8501:8501" # Expose the Streamlit frontend port publicly
    environment:
      - SECRET_KEY=dev_secret_key_laptop_price_prediction_2026
      - API_KEY=lappredict_secure_api_key_2026
      - PORT=8501 # Streamlit runs on 8501 inside the container
      # Let connections fall back to localhost inside the container
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
      - BACKEND_URL=http://127.0.0.1:8000/api/v1
      - MONGO_URI=mongodb://localhost:27017
      - MONGO_DB=laptop_price_db
    restart: always
