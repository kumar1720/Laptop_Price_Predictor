services:
  # Unified Laptop Price Predictor Service
  - type: web
    name: laptop-price-predictor
    env: docker
    plan: free
    region: oregon
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY
        value: lappredict_secure_api_key_2026
      # Route Streamlit locally to the API running on port 8000 on the same machine
      - key: BACKEND_URL
        value: http://127.0.0.1:8000/api/v1
      # Connect locally to the Redis instance running inside the same container
      - key: REDIS_HOST
        value: 127.0.0.1
      - key: REDIS_PORT
        value: "6379"
